<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Put Me On">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe8f4"/>
      <stop offset="100%" stop-color="#ffd1ea"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe600"/>
      <stop offset="35%" stop-color="#ff6a00"/>
      <stop offset="70%" stop-color="#ff2e93"/>
      <stop offset="100%" stop-color="#6a00ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0096b8"/>
      <stop offset="100%" stop-color="#ff2e93"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="3" fill="#ffd1ea" opacity=".7"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#dots)"/>

  <!-- top stripe -->
  <rect x="0" y="0" width="512" height="36" fill="#000"/>
  <rect x="0" y="0" width="512" height="32" fill="#ff2e93"/>

  <!-- stacked wordart: PUT / ME / ON -->
  <g transform="translate(60 90) skewX(-6)" filter="url(#shadow)">
    <text x="0" y="120" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="120" fill="url(#g1)" stroke="#1a0033" stroke-width="6"
          paint-order="stroke fill"
          style="filter: drop-shadow(5px 5px 0 #000)">PUT</text>
    <text x="0" y="240" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="120" fill="url(#g1)" stroke="#1a0033" stroke-width="6"
          paint-order="stroke fill"
          style="filter: drop-shadow(5px 5px 0 #000)">ME</text>
    <text x="0" y="360" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="120" fill="url(#g2)" stroke="#1a0033" stroke-width="6"
          paint-order="stroke fill"
          style="filter: drop-shadow(5px 5px 0 #000)">ON</text>
  </g>

  <!-- accent star -->
  <g transform="translate(390 130)">
    <polygon points="0,-50 14,-15 50,-10 22,15 32,55 0,32 -32,55 -22,15 -50,-10 -14,-15"
             fill="#caff00" stroke="#1a0033" stroke-width="6"/>
  </g>

  <!-- pixel divider at bottom -->
  <rect x="0" y="476" width="512" height="36" fill="#000"/>
  <g transform="translate(0 480)">
    <rect x="0"   y="0" width="64" height="28" fill="#ff2e93"/>
    <rect x="64"  y="0" width="64" height="28" fill="#00d4ff"/>
    <rect x="128" y="0" width="64" height="28" fill="#caff00"/>
    <rect x="192" y="0" width="64" height="28" fill="#ff6a00"/>
    <rect x="256" y="0" width="64" height="28" fill="#ff2e93"/>
    <rect x="320" y="0" width="64" height="28" fill="#00d4ff"/>
    <rect x="384" y="0" width="64" height="28" fill="#caff00"/>
    <rect x="448" y="0" width="64" height="28" fill="#ff6a00"/>
  </g>
</svg>
