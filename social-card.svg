<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe8f4"/>
      <stop offset="100%" stop-color="#ffd1ea"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="35%" stop-color="#ff6a00"/>
      <stop offset="70%" stop-color="#ff2e93"/>
      <stop offset="100%" stop-color="#6a00ff"/>
    </linearGradient>
    <linearGradient id="word2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0096b8"/>
      <stop offset="100%" stop-color="#ff2e93"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#ffd1ea"/>
    </pattern>
  </defs>

  <!-- background with tiled dots, like the site -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- top diagonal-stripe bar (matches site's topbar) -->
  <rect x="0" y="0" width="1200" height="50" fill="#000"/>
  <g>
    <rect x="0" y="0" width="1200" height="46" fill="url(#stripes)"/>
    <pattern id="stripes" width="40" height="46" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="40" height="46" fill="#ff2e93"/>
      <rect x="14" width="2" height="46" fill="#000"/>
      <rect x="14" y="0" width="14" height="46" fill="#00d4ff"/>
      <rect x="28" width="2" height="46" fill="#000"/>
    </pattern>
  </g>

  <!-- pixel divider near top -->
  <g transform="translate(0 50)">
    <rect x="0" y="0" width="150" height="14" fill="#ff2e93"/>
    <rect x="150" y="0" width="150" height="14" fill="#00d4ff"/>
    <rect x="300" y="0" width="150" height="14" fill="#caff00"/>
    <rect x="450" y="0" width="150" height="14" fill="#ff6a00"/>
    <rect x="600" y="0" width="150" height="14" fill="#ff2e93"/>
    <rect x="750" y="0" width="150" height="14" fill="#00d4ff"/>
    <rect x="900" y="0" width="150" height="14" fill="#caff00"/>
    <rect x="1050" y="0" width="150" height="14" fill="#ff6a00"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="14" x2="1200" y2="14" stroke="#000" stroke-width="2"/>
  </g>

  <!-- WordArt logo -->
  <g transform="translate(80 280) skewX(-6)">
    <text x="0" y="0" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="180" fill="url(#word)" stroke="#1a0033" stroke-width="6"
          paint-order="stroke fill"
          style="filter: drop-shadow(6px 6px 0 #000)">music s</text>
    <text x="640" y="0" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="180" fill="url(#word2)" stroke="#1a0033" stroke-width="6"
          paint-order="stroke fill"
          style="filter: drop-shadow(6px 6px 0 #000)">IT</text>
  </g>

  <!-- italic tagline -->
  <text x="80" y="370" font-family="Times New Roman, serif" font-style="italic"
        font-size="44" fill="#1a0033">where the <tspan fill="#ff2e93">underground</tspan> lives.</text>

  <!-- description line -->
  <text x="80" y="430" font-family="Trebuchet MS, sans-serif" font-size="26" fill="#6b3a8a">
    no playlists. no algorithms. real artists, real cities, real tip jars.
  </text>

  <!-- bottom badge bar -->
  <g transform="translate(80 490)">
    <rect x="0" y="0" width="220" height="44" fill="#000" stroke="#000" stroke-width="2"/>
    <text x="110" y="29" text-anchor="middle" font-family="Courier New, monospace"
          font-weight="bold" font-size="16" fill="#caff00">★ 1,284 ARTISTS</text>
    <rect x="232" y="0" width="180" height="44" fill="#ff2e93" stroke="#000" stroke-width="2"/>
    <text x="322" y="29" text-anchor="middle" font-family="Courier New, monospace"
          font-weight="bold" font-size="16" fill="#fff">♫ 47 CITIES</text>
    <rect x="424" y="0" width="220" height="44" fill="#00d4ff" stroke="#000" stroke-width="2"/>
    <text x="534" y="29" text-anchor="middle" font-family="Courier New, monospace"
          font-weight="bold" font-size="16" fill="#001a22">$ TIP JAR OPEN 24/7</text>
    <rect x="656" y="0" width="180" height="44" fill="#caff00" stroke="#000" stroke-width="2"/>
    <text x="746" y="29" text-anchor="middle" font-family="Courier New, monospace"
          font-weight="bold" font-size="16" fill="#1a2200">DIY · UNSIGNED</text>
  </g>

  <!-- decorative stars -->
  <g transform="translate(940 200)">
    <polygon points="0,-90 27,-26 95,-19 41,29 60,98 0,60 -60,98 -41,29 -95,-19 -27,-26"
             fill="#caff00" stroke="#1a0033" stroke-width="6"/>
    <polygon points="0,-50 14,-15 50,-10 22,15 32,55 0,32 -32,55 -22,15 -50,-10 -14,-15"
             transform="translate(120 60)"
             fill="#ff2e93" stroke="#1a0033" stroke-width="4"/>
    <polygon points="0,-35 10,-10 35,-7 15,10 22,38 0,22 -22,38 -15,10 -35,-7 -10,-10"
             transform="translate(50 -100)"
             fill="#00d4ff" stroke="#1a0033" stroke-width="3"/>
  </g>

  <!-- bottom URL strip -->
  <rect x="0" y="588" width="1200" height="42" fill="#000"/>
  <text x="600" y="617" text-anchor="middle" font-family="Courier New, monospace"
        font-weight="bold" font-size="18" fill="#caff00" letter-spacing="3">
    ▶ MUSIC SIT // EST. 2026 // WHERE THE UNDERGROUND LIVES ◀
  </text>
</svg>
