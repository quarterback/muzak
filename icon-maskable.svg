<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Put Me On">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e93"/>
      <stop offset="100%" stop-color="#6a00ff"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe600"/>
      <stop offset="50%" stop-color="#caff00"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- maskable safe zone is the inner 80% (~51..461). Keep all glyphs inside that. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(95 145) skewX(-6)">
    <text x="0" y="80" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="98" fill="url(#g1)" stroke="#1a0033" stroke-width="5"
          paint-order="stroke fill">PUT</text>
    <text x="0" y="170" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="98" fill="url(#g1)" stroke="#1a0033" stroke-width="5"
          paint-order="stroke fill">ME</text>
    <text x="0" y="260" font-family="Comic Sans MS, Comic Sans, cursive" font-weight="900"
          font-size="98" fill="#caff00" stroke="#1a0033" stroke-width="5"
          paint-order="stroke fill">ON</text>
  </g>
</svg>
